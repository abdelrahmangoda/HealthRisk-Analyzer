<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Risk Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8edf5;
    --muted: #7a8ba0;
    --heart: #e05a6a;
    --stroke: #4a9eff;
    --diabetes: #34d09a;
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  header { border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; background: var(--surface); }

  .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }

  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--heart); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }

  .status-badge { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(52,208,154,0.3); color: var(--diabetes); background: rgba(52,208,154,0.08); }

  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 2rem; }

  .tab { border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: all 0.2s; text-align: right; }

  .tab:hover { border-color: var(--border2); background: var(--surface2); }

  .tab.active-heart  { border-color: var(--heart);    background: rgba(224,90,106,0.08); }
  .tab.active-stroke { border-color: var(--stroke);   background: rgba(74,158,255,0.08); }
  .tab.active-diabetes { border-color: var(--diabetes); background: rgba(52,208,154,0.08); }

  .tab-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 8px; }

  .tab-heart   .tab-icon { background: rgba(224,90,106,0.15); color: var(--heart); }
  .tab-stroke  .tab-icon { background: rgba(74,158,255,0.15); color: var(--stroke); }
  .tab-diabetes .tab-icon { background: rgba(52,208,154,0.15); color: var(--diabetes); }

  .tab-name { font-size: 14px; font-weight: 500; }
  .tab-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; display: none; }
  .form-panel.visible { display: block; }

  .form-title { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }

  .form-title-dot { width: 8px; height: 8px; border-radius: 50%; }
  .heart-dot    { background: var(--heart); }
  .stroke-dot   { background: var(--stroke); }
  .diabetes-dot { background: var(--diabetes); }

  .fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; margin-bottom: 1.5rem; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; }

  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.15s; width: 100%; }

  input:focus, select:focus { border-color: var(--border2); }
  select option { background: var(--surface2); }

  .predict-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }

  .btn-heart    { background: var(--heart);    color: #fff; }
  .btn-stroke   { background: var(--stroke);   color: #fff; }
  .btn-diabetes { background: var(--diabetes); color: #0a0f1e; }

  .predict-btn:hover   { opacity: 0.88; transform: translateY(-1px); }
  .predict-btn:active  { transform: translateY(0); }
  .predict-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .result-panel { margin-top: 1.25rem; border-radius: 12px; padding: 1.25rem; display: none; animation: fadeIn 0.3s ease; border: 1px solid; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .result-panel.show { display: block; }

  .result-low  { background: rgba(52,208,154,0.08); border-color: rgba(52,208,154,0.25); }
  .result-high { background: rgba(224,90,106,0.08); border-color: rgba(224,90,106,0.25); }

  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .result-label   { font-size: 13px; color: var(--muted); }
  .result-verdict { font-size: 15px; font-weight: 600; }
  .verdict-low  { color: var(--diabetes); }
  .verdict-high { color: var(--heart); }

  .prob-bar-bg   { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .prob-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .fill-low  { background: var(--diabetes); }
  .fill-high { background: var(--heart); }

  .prob-number { font-family: var(--mono); font-size: 28px; font-weight: 500; margin-top: 6px; }

  .error-msg { margin-top: 1rem; padding: 12px; border-radius: 8px; background: rgba(224,90,106,0.08); border: 1px solid rgba(224,90,106,0.25); font-size: 13px; color: #f09090; display: none; }
  .error-msg.show { display: block; }

  .api-url { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 1.5rem; padding: 8px 12px; background: var(--surface2); border-radius: 6px; display: flex; align-items: center; gap: 8px; }
  .api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--diabetes); }

  .hint { font-size: 11px; color: var(--muted); margin-bottom: 1rem; padding: 8px 12px; background: var(--surface2); border-radius: 6px; border-right: 3px solid var(--heart); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Health Risk Analyzer
  </div>
  <div class="status-badge">API: localhost:8000</div>
</header>

<div class="container">
  <div class="api-url">
    <div class="api-dot"></div>
    http://127.0.0.1:8000
  </div>

  <div class="tabs">
    <div class="tab tab-heart active-heart" onclick="switchTab('heart')">
      <div class="tab-icon">♥</div>
      <div class="tab-name">القلب</div>
      <div class="tab-sub">Heart Disease</div>
    </div>
    <div class="tab tab-stroke" onclick="switchTab('stroke')">
      <div class="tab-icon">⚡</div>
      <div class="tab-name">السكتة الدماغية</div>
      <div class="tab-sub">Stroke</div>
    </div>
    <div class="tab tab-diabetes" onclick="switchTab('diabetes')">
      <div class="tab-icon">◈</div>
      <div class="tab-name">السكري</div>
      <div class="tab-sub">Diabetes</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ HEART -->
  <div id="form-heart" class="form-panel visible">
    <div class="form-title">
      <div class="form-title-dot heart-dot"></div>
      تحليل خطر أمراض القلب والأوعية الدموية
    </div>
    <div class="hint">
      💡 يتم حساب pulse pressure وbp severity وbmi_age تلقائياً
    </div>
    <div class="fields-grid">

      <div class="field">
        <label>العمر (سنة)</label>
        <input type="number" id="h_age" placeholder="50" min="1" max="120">
      </div>

      <div class="field">
        <label>الجنس</label>
        <select id="h_gender">
          <option value="1">أنثى (1)</option>
          <option value="2">ذكر (2)</option>
        </select>
      </div>

      <div class="field">
        <label>الضغط الانقباضي — Systolic BP</label>
        <input type="number" id="h_ap_hi" placeholder="120" min="60" max="250">
      </div>

      <div class="field">
        <label>الضغط الانبساطي — Diastolic BP</label>
        <input type="number" id="h_ap_lo" placeholder="80" min="40" max="200">
      </div>

      <div class="field">
        <label>الكوليسترول</label>
        <select id="h_cholesterol">
          <option value="1">طبيعي (1)</option>
          <option value="2">فوق الطبيعي (2)</option>
          <option value="3">مرتفع جداً (3)</option>
        </select>
      </div>

      <div class="field">
        <label>الجلوكوز</label>
        <select id="h_gluc">
          <option value="1">طبيعي (1)</option>
          <option value="2">فوق الطبيعي (2)</option>
          <option value="3">مرتفع جداً (3)</option>
        </select>
      </div>

      <div class="field">
        <label>التدخين</label>
        <select id="h_smoke">
          <option value="0">لا يدخن (0)</option>
          <option value="1">يدخن (1)</option>
        </select>
      </div>

      <div class="field">
        <label>الكحول</label>
        <select id="h_alco">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>النشاط البدني</label>
        <select id="h_active">
          <option value="1">نشط (1)</option>
          <option value="0">غير نشط (0)</option>
        </select>
      </div>

      <div class="field">
        <label>مؤشر كتلة الجسم — BMI</label>
        <input type="number" id="h_bmi" placeholder="25.0" min="10" max="60" step="0.1">
      </div>

    </div>
    <button class="predict-btn btn-heart" onclick="predict('heart')">
      تحليل خطر القلب
    </button>
    <div id="result-heart" class="result-panel"></div>
    <div id="error-heart" class="error-msg"></div>
  </div>

  <!-- ═══════════════════════════════════════════════ STROKE -->
  <div id="form-stroke" class="form-panel">
    <div class="form-title">
      <div class="form-title-dot stroke-dot"></div>
      تحليل خطر السكتة الدماغية
    </div>
    <div class="fields-grid">

      <div class="field">
        <label>الجنس</label>
        <select id="s_gender">
          <option value="1">ذكر (1)</option>
          <option value="0">أنثى (0)</option>
        </select>
      </div>

      <div class="field">
        <label>العمر (سنة)</label>
        <input type="number" id="s_age" placeholder="45" min="1" max="120">
      </div>

      <div class="field">
        <label>ضغط الدم المرتفع</label>
        <select id="s_hypertension">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>أمراض القلب</label>
        <select id="s_heart_disease">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>متزوج</label>
        <select id="s_ever_married">
          <option value="1">نعم (1)</option>
          <option value="0">لا (0)</option>
        </select>
      </div>

      <div class="field">
        <label>نوع السكن</label>
        <select id="s_residence">
          <option value="1">مدينة (1)</option>
          <option value="0">ريف (0)</option>
        </select>
      </div>

      <div class="field">
        <label>متوسط الجلوكوز</label>
        <input type="number" id="s_glucose" placeholder="100" min="50" max="300" step="0.1">
      </div>

      <div class="field">
        <label>مؤشر كتلة الجسم — BMI</label>
        <input type="number" id="s_bmi" placeholder="25" min="10" max="70" step="0.1">
      </div>

      <div class="field">
        <label>عمل خاص — Private</label>
        <select id="s_work_private">
          <option value="1">نعم (1)</option>
          <option value="0">لا (0)</option>
        </select>
      </div>

      <div class="field">
        <label>عمل حر — Self-employed</label>
        <select id="s_work_self">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>أطفال — Children</label>
        <select id="s_work_children">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>دخّن سابقاً — Formerly smoked</label>
        <select id="s_smoke_former">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>لا يدخن أبداً — Never smoked</label>
        <select id="s_smoke_never">
          <option value="1">نعم (1)</option>
          <option value="0">لا (0)</option>
        </select>
      </div>

      <div class="field">
        <label>يدخن حالياً — Smokes</label>
        <select id="s_smoke_current">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>كبير السن — Elderly</label>
        <select id="s_elderly">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

    </div>
    <button class="predict-btn btn-stroke" onclick="predict('stroke')">
      تحليل خطر السكتة
    </button>
    <div id="result-stroke" class="result-panel"></div>
    <div id="error-stroke" class="error-msg"></div>
  </div>

  <!-- ═══════════════════════════════════════════════ DIABETES -->
  <div id="form-diabetes" class="form-panel">
    <div class="form-title">
      <div class="form-title-dot diabetes-dot"></div>
      تحليل خطر السكري
    </div>
    <div class="fields-grid">

      <div class="field">
        <label>الجنس</label>
        <select id="d_gender">
          <option value="1">ذكر (1)</option>
          <option value="0">أنثى (0)</option>
        </select>
      </div>

      <div class="field">
        <label>العمر (سنة)</label>
        <input type="number" id="d_age" placeholder="40" min="1" max="120">
      </div>

      <div class="field">
        <label>ضغط الدم المرتفع</label>
        <select id="d_hypertension">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>أمراض القلب</label>
        <select id="d_heart_disease">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>مؤشر كتلة الجسم — BMI</label>
        <input type="number" id="d_bmi" placeholder="27" min="10" max="70" step="0.1">
      </div>

      <div class="field">
        <label>مستوى HbA1c</label>
        <input type="number" id="d_hba1c" placeholder="5.5" min="3" max="15" step="0.1">
      </div>

      <div class="field">
        <label>مستوى الجلوكوز بالدم</label>
        <input type="number" id="d_glucose" placeholder="100" min="50" max="400">
      </div>

      <div class="field">
        <label>تدخين — No Info</label>
        <select id="d_smoke_noinfo">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>يدخن حالياً — Current</label>
        <select id="d_smoke_current">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>دخّن في الماضي — Ever</label>
        <select id="d_smoke_ever">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>دخّن سابقاً — Former</label>
        <select id="d_smoke_former">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

      <div class="field">
        <label>لم يدخن أبداً — Never</label>
        <select id="d_smoke_never">
          <option value="1">نعم (1)</option>
          <option value="0">لا (0)</option>
        </select>
      </div>

      <div class="field">
        <label>لا يدخن حالياً — Not current</label>
        <select id="d_smoke_notcurrent">
          <option value="0">لا (0)</option>
          <option value="1">نعم (1)</option>
        </select>
      </div>

    </div>
    <button class="predict-btn btn-diabetes" onclick="predict('diabetes')">
      تحليل خطر السكري
    </button>
    <div id="result-diabetes" class="result-panel"></div>
    <div id="error-diabetes" class="error-msg"></div>
  </div>

</div>

<script>
const API = 'http://127.0.0.1:8000';

function switchTab(type) {
  ['heart','stroke','diabetes'].forEach(t => {
    document.getElementById('form-' + t).classList.remove('visible');
  });
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active-heart','active-stroke','active-diabetes');
  });
  document.getElementById('form-' + type).classList.add('visible');
  const idx = ['heart','stroke','diabetes'].indexOf(type);
  document.querySelectorAll('.tab')[idx].classList.add('active-' + type);
}

function g(id) {
  const el = document.getElementById(id);
  return el ? (parseFloat(el.value) || 0) : 0;
}

function getPayload(type) {

  // ── HEART ──────────────────────────────────────────────
  if (type === 'heart') {
    const age   = g('h_age');
    const ap_hi = g('h_ap_hi');
    const ap_lo = g('h_ap_lo');
    const bmi   = g('h_bmi');
    const smoke = g('h_smoke');

    // حساب الـ engineered features تلقائياً
    const pulse_pressure = ap_hi - ap_lo;

    let bp_severity = 0;
    if      (ap_hi >= 160) bp_severity = 4;
    else if (ap_hi >= 140) bp_severity = 3;
    else if (ap_hi >= 130) bp_severity = 2;
    else if (ap_hi >= 120) bp_severity = 1;

    const bmi_age   = Math.round(bmi   * age * 100) / 100;
    const smoke_age = Math.round(smoke * age * 100) / 100;

    return {
      age          : age,
      gender       : g('h_gender'),
      ap_hi        : ap_hi,
      ap_lo        : ap_lo,
      cholesterol  : g('h_cholesterol'),
      gluc         : g('h_gluc'),
      smoke        : smoke,
      alco         : g('h_alco'),
      active       : g('h_active'),
      bmi          : bmi,
      pulse_pressure : pulse_pressure,
      bp_severity    : bp_severity,
      bmi_age        : bmi_age,
      smoke_age      : smoke_age,
    };
  }

  // ── STROKE ─────────────────────────────────────────────
  if (type === 'stroke') {
    return {
      gender                          : g('s_gender'),
      age                             : g('s_age'),
      hypertension                    : g('s_hypertension'),
      heart_disease                   : g('s_heart_disease'),
      ever_married                    : g('s_ever_married'),
      Residence_type                  : g('s_residence'),
      avg_glucose_level               : g('s_glucose'),
      bmi                             : g('s_bmi'),
      work_type_Private               : g('s_work_private'),
      'work_type_Self-employed'       : g('s_work_self'),
      work_type_children              : g('s_work_children'),
      'smoking_status_formerly smoked': g('s_smoke_former'),
      'smoking_status_never smoked'   : g('s_smoke_never'),
      smoking_status_smokes           : g('s_smoke_current'),
      is_elderly                      : g('s_elderly'),
    };
  }

  // ── DIABETES ───────────────────────────────────────────
  if (type === 'diabetes') {
    return {
      gender                        : g('d_gender'),
      age                           : g('d_age'),
      hypertension                  : g('d_hypertension'),
      heart_disease                 : g('d_heart_disease'),
      bmi                           : g('d_bmi'),
      hbA1c_level                   : g('d_hba1c'),
      blood_glucose_level           : g('d_glucose'),
      'smoking_history_No Info'     : g('d_smoke_noinfo'),
      smoking_history_current       : g('d_smoke_current'),
      smoking_history_ever          : g('d_smoke_ever'),
      smoking_history_former        : g('d_smoke_former'),
      smoking_history_never         : g('d_smoke_never'),
      'smoking_history_not current' : g('d_smoke_notcurrent'),
    };
  }
}

async function predict(type) {
  const btn       = document.querySelector('#form-' + type + ' .predict-btn');
  const resultDiv = document.getElementById('result-'  + type);
  const errorDiv  = document.getElementById('error-'   + type);

  btn.disabled    = true;
  btn.textContent = 'جاري التحليل...';
  resultDiv.classList.remove('show');
  errorDiv.classList.remove('show');

  try {
    const payload = getPayload(type);
    console.log('Sending to API:', payload);

    const res = await fetch(API + '/predict/' + type, {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify(payload),
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error('HTTP ' + res.status + ' — ' + errText);
    }

    const data   = await res.json();
    const prob   = Math.round(data.probability * 100);
    const isHigh = data.prediction === 1;

    resultDiv.className = 'result-panel show ' + (isHigh ? 'result-high' : 'result-low');
    resultDiv.innerHTML = `
      <div class="result-header">
        <div class="result-label">نتيجة التحليل</div>
        <div class="result-verdict ${isHigh ? 'verdict-high' : 'verdict-low'}">
          ${isHigh ? '⚠️ خطر مرتفع' : '✅ خطر منخفض'}
        </div>
      </div>
      <div class="prob-number" style="color:${isHigh ? 'var(--heart)' : 'var(--diabetes)'}">
        ${prob}%
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">احتمالية الإصابة</div>
      <div class="prob-bar-bg">
        <div class="prob-bar-fill ${isHigh ? 'fill-high' : 'fill-low'}"
             style="width:0%" id="bar-${type}"></div>
      </div>
    `;

    setTimeout(() => {
      const bar = document.getElementById('bar-' + type);
      if (bar) bar.style.width = prob + '%';
    }, 50);

  } catch (err) {
    console.error(err);
    errorDiv.textContent = 'خطأ: ' + err.message;
    errorDiv.classList.add('show');

  } finally {
    btn.disabled = false;
    btn.textContent =
      type === 'heart'    ? 'تحليل خطر القلب'   :
      type === 'stroke'   ? 'تحليل خطر السكتة'  :
                            'تحليل خطر السكري';
  }
}
</script>
</body>
</html>
